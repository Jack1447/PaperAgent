# ========== 主模型参数 (Summarize / Reading / Review) ==========
main_model:
  temperature: 0.3
  max_tokens: 4096
  timeout: 120

# ========== 快速模型参数 (Planner / Search / Reflection) ==========
fast_model:
  temperature: 0.1
  max_tokens: 2048
  timeout: 60

# ========== 重试配置 ==========
retry:
  max_attempts: 3
  min_wait: 1       # 秒
  max_wait: 10      # 秒
