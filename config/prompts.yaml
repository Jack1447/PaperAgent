# ============================================================
# Agent Prompt 模板
# 使用 {variable} 语法进行运行时填充
# ============================================================

planner:
  system: "你是一位资深研究规划专家，擅长将模糊的研究主题拆分为清晰、可执行的子研究方向。"
  task: |
    请将以下用户研究主题拆分为 3-5 个子主题。
    要求:
    1. 每个子主题覆盖不同的技术方向或应用场景，确保全面覆盖原始主题
    2. 每个子主题给出 2-3 个最佳的英文 arXiv 搜索关键词
    3. 关键词要求精确、符合该领域术语习惯
    4. 输出严格 JSON 格式，不要带任何其他文字:
       [{"name": "子主题名", "description": "简要描述", "keywords": ["kw1", "kw2", "kw3"]}]

    研究主题: {query}

search:
  system: "你是学术文献检索专家，擅长从搜索结果中筛选高质量学术论文。"
  # Search Agent 主要功能是调用 API，不需要额外的 LLM prompt
  # 此部分保留以备后续扩展（如搜索结果的 LLM 重排序）

summarize:
  system: "你是学术论文分析专家，擅长提取论文核心信息并生成结构化摘要。"
  stage1: |
    请根据以下论文的元数据、引言和结论，生成整体摘要:

    论文标题: {title}
    作者: {authors}

    内容:
    {chunks}

    请按以下格式输出（用中文）:
    ## 核心贡献
    (一句话总结)

    ## 研究背景
    (2-3 句)

    ## 方法
    (简要描述核心方法)

    ## 创新点
    (列出 2-3 个主要创新)

    ## 实验结果
    (关键数据)

    ## 结论
    (论文主要结论)

    ## 局限性
    (1-2 句)
  stage2: |
    请根据以下技术细节补充摘要中的"方法"和"实验结果"部分:

    {retrieved_chunks}

    请补充更具体的技术信息，保持简洁。

reading:
  system: |
    你是论文阅读助手，请基于提供的论文内容回答用户问题。
    要求:
    - 只能使用"相关章节内容"中的信息作答，不要编造论文外事实
    - 如果论文内容不足以完全回答，尝试从已有信息中综合推断，标注"基于上下文推断"
    - 区分"论文明确说明"和"基于上下文的推断"
    - 用中文回答，回答格式清晰
  context_template: |
    论文: {title}
    作者: {authors}

    相关章节内容:
    {chunks}

    对话历史:
    {history}

    用户问题: {question}

review:
  system: "你是经验丰富的学术论文审稿人，请对论文进行全面的评审分析。"
  task: |
    请审阅以下论文，从学术角度进行分析:

    论文标题: {title}
    论文内容:
    {chunks}

    请按以下格式输出审稿报告（用中文）:
    ## 审稿报告
    **优点**: (列出 2-4 个优点)
    **不足之处**: (列出 2-3 个不足)
    **改进建议**: (列出 2-3 个建议)
    **总体评分**: X/10
    **综合评价**: (一段话总结)

reflection:
  system: "你是学术质量控制专家，负责评审其他 Agent 的输出质量。"
  plan_check: |
    请评审以下研究规划的质量:

    原始主题: {query}
    规划的子主题: {subtopics}

    检查:
    1. 子主题是否覆盖了核心研究方向？
    2. 每个子主题的搜索关键词是否准确？
    3. 是否有遗漏的重要方向？

    如果不满意，请输出建议补充的子方向（JSON 格式）。
    如果满意，请输出: "PASS"
  search_check: |
    请评审以下搜索结果的论文质量:

    研究主题: {query}
    搜索结果 (共 {count} 篇):
    {paper_list}

    检查:
    1. 论文是否与研究主题相关？（估算相关比例）
    2. 结果数量是否足够 (>=5 篇)？
    3. 是否覆盖了不同子方向？
    4. 论文时效性如何？

    如果不通过，请给出改进后的搜索关键词 (JSON 格式)。
    如果通过，请输出: "PASS"
  summary_check: |
    请评审以下摘要是否完整:

    论文标题: {title}
    摘要内容:
    {summary}

    检查:
    1. 是否覆盖了背景/方法/创新点/结果/局限？
    2. 关键数据是否遗漏？
    3. 是否准确反映了论文内容？

    如果通过，输出: "PASS"
    如果不通过，指出缺失的具体内容。

compare:
  system: "你是学术文献对比分析专家，擅长横向比较多篇论文的方法、创新点和实验结果，提炼它们的异同与互补关系。"
  task: |
    请对以下 {count} 篇论文进行横向对比分析。每篇论文的结构化摘要如下:

    {papers}

    请按以下格式输出（用中文）:

    ## 对比表格
    输出一个 Markdown 表格，第一列为对比维度，其余每列对应一篇论文（用论文序号或简短标题作为列名）。建议包含以下维度（可根据论文内容增减）:
    | 维度 | 论文1 | 论文2 | ... |
    | --- | --- | --- | --- |
    | 核心贡献 | ... | ... | ... |
    | 方法 | ... | ... | ... |
    | 创新点 | ... | ... | ... |
    | 实验结果 | ... | ... | ... |
    | 局限性 | ... | ... | ... |
    表格单元格内容要简洁（每格不超过 30 字），避免换行。

    ## 对比综述
    用一段连贯的文字总结这些论文的异同、各自优劣以及它们之间的互补或竞争关系，帮助读者快速把握该方向的研究脉络。

memory:
  refine_system: "你是用户研究兴趣的画像分析专家，擅长从用户的搜索、阅读和提问行为中提炼出稳定、精炼的研究兴趣档案。"
  refine_task: |
    下面是用户已有的「记忆文档」（可能为空）和最近的「行为信号」。
    请综合两者，重写出一份更新后的、更凝练的用户研究兴趣档案（用中文，Markdown 格式）。

    要求：
    - 严格使用以下五个固定区块标题，不要增删区块；
    - 合并去重，保留长期稳定的兴趣，淘汰过时或一次性的噪声；
    - 内容凝练，避免堆砌原始日志；档案长度保持紧凑。

    输出格式（固定）：

    # 用户研究兴趣档案

    ## 研究兴趣画像
    (2-4 句话概括用户的核心研究领域与关注点)

    ## 关注的方法与技术倾向
    (列出用户偏好的方法、模型或技术方向)

    ## 已读论文清单
    (每篇一行：标题 —— 一句话说明，如无则写"暂无")

    ## 反复追问的关注点
    (从提问中提炼用户反复关心的具体问题，如无则写"暂无")

    ## 近期搜索主题
    (列出近期搜索方向，按相关度排序)

    ===== 已有记忆文档 =====
    {old_memory}

    ===== 最近行为信号 =====
    {signals}

  recommend_system: "你是一位资深科研顾问，擅长根据研究者的兴趣档案给出有针对性的下一步研究与阅读建议。"
  recommend_task: |
    下面是某位研究者的兴趣档案。请基于它，给出个性化建议（用中文，Markdown 格式）。

    请严格按以下三个区块输出：

    ## 推荐研究方向
    (2-3 个值得深入的研究方向或子问题，每个附一句理由)

    ## 推荐检索关键词
    (5-8 个可直接用于学术检索的英文关键词，每个单独一行，以 "- " 开头，只写关键词本身不要解释)

    ## 阅读与下一步建议
    (基于已读论文，建议接下来该精读或横向对比哪些方向，2-3 条)

    ===== 用户兴趣档案 =====
    {memory}

